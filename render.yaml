services:
  # NCERT Learning Platform Backend
  - type: web
    name: eduresolve-backend
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: eduresolve-db
          property: connectionString
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_OWNER
        value: ncert-content
      - key: GITHUB_REPO
        value: ncert-books
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-3.5-turbo
      - key: SERVER_PORT
        value: 8080
      - key: JAVA_OPTS
        value: "-Xmx512m -Xms256m"
    buildCommand: "./mvnw clean package -DskipTests"
    startCommand: "java -jar target/EduResolve_Backend-0.0.1-SNAPSHOT.jar"

  # PostgreSQL Database
  - type: pserv
    name: eduresolve-db
    plan: free
    databaseName: ncert_learning
    user: ncert_user
    addons:
      - name: pg-bouncer
        plan: free

  # Redis for caching (optional)
  - type: redis
    name: eduresolve-redis
    plan: free
    ipAllowList: []
    connectionOptions:
      - key: maxmemory-policy
        value: allkeys-lru

databases:
  - name: eduresolve-db
    databaseName: ncert_learning
    user: ncert_user
    plan: free
    region: oregon
    version: "13"
