spring:
  application:
    name: EduResolve

  config:
    import: optional:classpath:application-local.yaml

  # ---------------------------------------------------------------------
  # PostgreSQL connection
  # Override any of these with environment variables (recommended for prod):
  #   DB_URL, DB_USER, DB_PASSWORD
  # ---------------------------------------------------------------------
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:K1ngK0hl1@234}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      pool-name: EduResolveHikariCP

  jpa:
    hibernate:
      ddl-auto: update   # options: none, update, create, create-drop
    show-sql: true
    defer-datasource-initialization: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  sql:
    init:
      mode: never

  # ---------------------------------------------------------------------
  # Flyway — runs versioned migrations from classpath:db/migration
  # baseline-on-migrate: treats all pre-existing schema (created by
  #   ddl-auto: update) as already at V1, so only V2+ migrations run.
  # ---------------------------------------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    out-of-order: false

  # Spring Session JDBC: create the SPRING_SESSION + SPRING_SESSION_ATTRIBUTES
  # tables on startup. Required because the spring-boot-starter-session-jdbc
  # dependency is on the classpath. If you don't need server-side sessions at
  # all, remove that dependency from pom.xml instead.
  session:
    jdbc:
      initialize-schema: always
      table-name: SPRING_SESSION
    timeout: 30m

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

# OpenAI API Configuration
openai:
  api:
    key:   ${OPENAI_API_KEY}
    model: ${OPENAI_MODEL:gpt-4o-mini}
  chat:
    max-tokens:      600
    context-tokens:  6000
    rate-per-minute: 20

reports:
  storage-dir: ${REPORTS_DIR:uploads/attendance-reports}
  school-name: ${SCHOOL_NAME:EduResolve Academy}

jwt:
  secret: ${JWT_SECRET:eduResolve-jwt-secret-key-for-development-only-min-32-chars}
  expiry-hours: ${JWT_EXPIRY_HOURS:24}

logging:
  level:
    org.hibernate.SQL: INFO
    org.springframework.jdbc.datasource.init.ScriptUtils: INFO
    com.forgeStackk.EduResolve: DEBUG


