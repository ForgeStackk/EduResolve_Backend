spring:
  application:
    name: EduResolve

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: false

  sql:
    init:
      mode: never

  flyway:
    enabled: false

  # Disable unnecessary services during test
  websocket:
    servlet:
      path: /ws

openai:
  api-key: ${OPENAI_API_KEY:test-key}
  model: gpt-4

github:
  token: ${GITHUB_TOKEN:test-token}

logging:
  level:
    root: WARN
    com.forgeStackk.EduResolve: DEBUG
