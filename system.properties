# Heroku Java Configuration
java.runtime.version=17

# Memory Settings
java.options=-Xmx512m -Xms256m -XX:+UseG1GC -XX:+UseStringDeduplication

# Application Configuration
server.port=${PORT:8080}
spring.profiles.active=production

# Database Configuration (will be set by Heroku)
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=postgresql
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Connection Pooling
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Logging
logging.level.com.forgeStackk.EduResolve=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Management Endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# GitHub API Configuration
github.token=${GITHUB_TOKEN}
github.owner=${GITHUB_OWNER:ncert-content}
github.repo=${GITHUB_REPO:ncert-books}

# OpenAI Configuration
openai.api.key=${OPENAI_API_KEY}
openai.model=${OPENAI_MODEL:gpt-3.5-turbo}

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Security Headers
security.headers.frame-options=DENY
security.headers.content-type-options=nosniff
security.headers.xss-protection=1; mode=block
